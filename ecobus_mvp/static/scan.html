<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ecobus Scanner</title>

  <!-- ZXing (UMD) -->
  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.4/umd/zxing-browser.js"></script>

  <style>
    :root{--ok:#0a7a2f;--bad:#b00020;}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; margin:0; padding:16px; background:#0b0f14; color:#fff;}
    .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center;}
    select, button{font-size:18px; padding:10px 12px; border-radius:12px; border:1px solid #2a3642; background:#101824; color:#fff;}
    button{cursor:pointer;}
    button:disabled{opacity:.5; cursor:not-allowed;}
    .card{background:#101824; border:1px solid #2a3642; border-radius:16px; padding:14px;}
    .status{margin-top:12px; padding:16px; border-radius:16px; font-size:16px; font-weight:700; display:none; white-space:pre-wrap;}
    .status.ok{background:rgba(10,122,47,.25); border:1px solid rgba(10,122,47,.8);}
    .status.bad{background:rgba(176,0,32,.25); border:1px solid rgba(176,0,32,.8);}
    .muted{opacity:.8; font-size:14px;}
    .big{font-size:18px; margin-top:6px; font-weight:600;}
    video{width:100%; max-width:560px; margin-top:12px; border-radius:16px; background:#000;}
  </style>
</head>

<body>
  <div class="card">
    <div class="row">
      <label>
        <div class="muted">Tipo de viaje</div>
        <select id="tripType">
          <option value="IDA" selected>IDA</option>
          <option value="VUELTA">VUELTA</option>
        </select>
      </label>

      <label>
        <div class="muted">Punto de subida</div>
        <select id="pickupPoint" required>
          <option value="" selected disabled>Selecciona…</option>
          <option value="LA_COLONIA">La Colonia</option>
          <option value="CRUCE_MALLOCO">Cruce Malloco</option>
          <option value="LA_MONEDA">La Moneda</option>
        </select>
      </label>

      <button id="startBtn" type="button">Iniciar cámara</button>
      <button id="stopBtn" type="button" disabled>Detener</button>
    </div>

    <video id="video" playsinline muted autoplay></video>

    <div id="status" class="status"></div>
    <div class="muted" style="margin-top:10px;">
      Tip: el QR suele ser URL <b>/q/TOKEN</b> o <b>/ot/TOKEN</b>. Se extrae el token automático.
    </div>
  </div>

<script>
(() => {
  const elStatus = document.getElementById('status');
  const tripType = document.getElementById('tripType');
  const pickupPoint = document.getElementById('pickupPoint');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const video = document.getElementById('video');

  function showResult(ok, title, subtitle){
    elStatus.style.display = 'block';
    elStatus.className = 'status ' + (ok ? 'ok' : 'bad');
    elStatus.innerHTML = `<div>${title}</div><div class="big">${subtitle || ''}</div>`;
  }
  function clearResult(){ elStatus.style.display='none'; elStatus.textContent=''; }

  // Debug visible si ocurre error JS
  window.addEventListener('error', (ev) => {
    showResult(false, 'JS ERROR', `${ev.message}\n${ev.filename}:${ev.lineno}:${ev.colno}`);
  });
  window.addEventListener('unhandledrejection', (ev) => {
    showResult(false, 'PROMISE ERROR', String(ev.reason || ev));
  });

  let stream = null;
  let running = false;
  let busy = false;
  let lastToken = null;
  let zxingReader = null;

  let audioCtx = null;

function ensureAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
}

function playOkBeep() {
  try {
    ensureAudioContext();
    if (!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(1040, audioCtx.currentTime);

    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.18, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.16);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.16);
  } catch {}
}

function playBadBeep() {
  try {
    ensureAudioContext();
    if (!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'square';
    osc.frequency.setValueAtTime(280, audioCtx.currentTime);

    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.14, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.22);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.22);
  } catch {}
}

  function extractToken(text){
    try{
      const u = new URL(text);
      const parts = u.pathname.split('/').filter(Boolean);
      if (parts.length >= 2 && (parts[0] === 'q' || parts[0] === 'ot')) return parts[1];
      return parts[parts.length-1];
    }catch(e){
      return (text || '').trim();
    }
  }

  async function validateScanned(raw){
    if (busy) return;
    if (!pickupPoint.value){
      showResult(false, 'RECHAZADO', 'Selecciona punto de subida');
      return;
    }
    busy = true;

    const token = extractToken(raw);
    const params = new URLSearchParams({
      token,
      trip_type: tripType.value,
      pickup_point: pickupPoint.value
    });

    try{
      const res = await fetch(`/api/validate?${params.toString()}`, { cache: "no-store" });
      const data = await res.json();

    if (data.result === 'OK'){
      playOkBeep();

      const planTxt = data.plan ? ` - ${data.plan}` : '';
      const remTxt = (data.rides_remaining !== undefined && data.rides_remaining !== null)
        ? ` | Restan: ${data.rides_remaining}` : '';
      showResult(true, 'OK', `${data.full_name} (${data.code})${planTxt}${remTxt}`);
      setTimeout(clearResult, 2500);
    } else {
      playBadBeep();

      const reason = data.reason ? ` - ${data.reason}` : '';
      showResult(false, `RECHAZADO${reason}`, `${data.full_name || ''} ${data.code ? '('+data.code+')' : ''}`);
      setTimeout(clearResult, 3500);
    }
      
    } catch (e){
      showResult(false, 'ERROR', `No se pudo validar\n${e?.name || ''} ${e?.message || ''}`);
    } finally {
      busy = false;
    }
  }

  async function startCamera(){
    clearResult();

    if (!pickupPoint.value){
      showResult(false, 'RECHAZADO', 'Selecciona punto de subida');
      return;
    }
    if (running) return;

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showResult(false, 'ERROR', 'Este navegador no soporta cámara (getUserMedia).');
      return;
    }

    startBtn.disabled = true;
    stopBtn.disabled = false;

    try{
      // cerrar stream previo
      if (stream){
        try { stream.getTracks().forEach(t => t.stop()); } catch {}
        stream = null;
      }

      // 3 intentos (mobile-friendly) - FORZAR FRONTAL
      try {
        // 1) forzar user (frontal) si el dispositivo lo permite
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { exact: "user" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
      } catch (e0) {
        try {
          // 2) user ideal (más permisivo)
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "user" },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            audio: false
          });
        } catch (e1) {
          try {
            // 3) sin facingMode
            stream = await navigator.mediaDevices.getUserMedia({
              video: {
                width: { ideal: 1280 },
                height: { ideal: 720 }
              },
              audio: false
            });
          } catch (e2) {
            // 4) último fallback
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          }
        }
     }

      if (!stream) throw new Error("No se obtuvo stream de cámara");

      video.srcObject = stream;
      video.setAttribute("playsinline", "true");
      video.muted = true;
      await video.play();

      running = true;
      lastToken = null;

     const ZX = window.ZXingBrowser || window.ZXing;
      if (!ZX) throw new Error("ZXing no cargó");

      zxingReader = new ZX.BrowserQRCodeReader();

      // Listar cámaras y preferir frontal si existe
    let deviceId = null;
    try {
      const devices = await ZX.BrowserCodeReader.listVideoInputDevices();

      if (devices && devices.length) {
        const labels = devices.map(d => ({
          id: d.deviceId,
          label: (d.label || "").toLowerCase()
        }));

        // Prioridad alta: frontal / user / facetime / selfie
        const front = labels.find(d =>
          /front|user|facetime|selfie|frontal/.test(d.label)
        );

        // Evitar explícitamente back/rear/environment si aparece etiquetado
        const nonRear = labels.find(d =>
          !/back|rear|environment|trasera|posterior/.test(d.label)
        );

        if (front) {
          deviceId = front.id;
        } else if (nonRear) {
          deviceId = nonRear.id;
        } else {
          deviceId = devices[0].deviceId;
        }
      }
    } catch (e) {
      // si falla listar, dejamos deviceId null
    }

      await zxingReader.decodeFromVideoDevice(deviceId, video, async (result, err) => {
        if (!running) return;
        if (result){
          const raw = (result.getText ? result.getText() : String(result)).trim();
          if (!raw) return;

          const tokenMaybe = extractToken(raw);
          if (tokenMaybe && tokenMaybe !== lastToken){
            lastToken = tokenMaybe;
            await validateScanned(raw);
          }
        }
      });

    } catch (e){
      const secure = window.isSecureContext ? "YES" : "NO";
      showResult(false, 'ERROR', `${e?.name || "Error"}: ${e?.message || "sin detalle"} | secure=${secure}`);
      stopCamera();
    }
  }

  function stopCamera(){
    running = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;

    // detener ZXing
    if (zxingReader){
      try { zxingReader.reset(); } catch {}
      zxingReader = null;
    }

    // detener stream
    if (stream){
      try { stream.getTracks().forEach(t => t.stop()); } catch {}
      stream = null;
    }

    video.srcObject = null;
  }

  startBtn.addEventListener('click', () => {
  ensureAudioContext();
  startCamera();
  });
  stopBtn.addEventListener('click', () => stopCamera());
  window.addEventListener('beforeunload', stopCamera);
})();
</script>

</body>
</html>
