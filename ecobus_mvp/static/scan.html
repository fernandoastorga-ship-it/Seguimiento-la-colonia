<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ecobus Scanner</title>
<script src="https://unpkg.com/@zxing/browser@0.1.4/umd/index.min.js"></script>
  <style>
    :root{--ok:#0a7a2f;--bad:#b00020;}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; margin:0; padding:16px; background:#0b0f14; color:#fff;}
    .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center;}
    select, button{font-size:18px; padding:10px 12px; border-radius:12px; border:1px solid #2a3642; background:#101824; color:#fff;}
    button{cursor:pointer;}
    #reader{width:100%; max-width:560px; margin-top:12px; border-radius:16px; overflow:hidden;}
    .card{background:#101824; border:1px solid #2a3642; border-radius:16px; padding:14px;}
    .status{margin-top:12px; padding:16px; border-radius:16px; font-size:20px; font-weight:700; display:none;}
    .status.ok{background:rgba(10,122,47,.25); border:1px solid rgba(10,122,47,.8);}
    .status.bad{background:rgba(176,0,32,.25); border:1px solid rgba(176,0,32,.8);}
    .muted{opacity:.8; font-size:14px;}
    .big{font-size:22px; margin-top:6px;}
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <label>
        <div class="muted">Tipo de viaje</div>
        <select id="tripType">
          <option value="IDA" selected>IDA</option>
          <option value="VUELTA">VUELTA</option>
        </select>
      </label>
      <label>
        <div class="muted">Punto de subida</div>
        <select id="pickupPoint" required>
          <option value="" selected disabled>Selecciona…</option>
          <option value="LA_COLONIA">La Colonia</option>
          <option value="CRUCE_MALLOCO">Cruce Malloco</option>
          <option value="LA_MONEDA">La Moneda</option>
        </select>
      </label>
      <button id="startBtn">Iniciar cámara</button>
      <button id="stopBtn" disabled>Detener</button>
    </div>
    <video id="video" playsinline muted style="width:100%; max-width:560px; margin-top:12px; border-radius:16px; background:#000;"></video>
    <video id="video" playsinline muted autoplay style="width:100%; max-width:560px; margin-top:12px; border-radius:16px; background:#000;"></video>
    <div id="status" class="status"></div>
    <div class="muted" style="margin-top:10px;">Tip: el QR del pasajero suele ser una URL tipo <b>/q/TOKEN</b>. El sistema extrae el token automáticamente.</div>
  </div>

<script>
  const elStatus = document.getElementById('status');
  const tripType = document.getElementById('tripType');
  const pickupPoint = document.getElementById('pickupPoint');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const video = document.getElementById('video');

  let stream = null;
  let running = false;
  let busy = false;
  let lastToken = null;
  let zxingReader = null;

  function showResult(ok, title, subtitle){
    elStatus.style.display = 'block';
    elStatus.className = 'status ' + (ok ? 'ok' : 'bad');
    elStatus.innerHTML = `<div>${title}</div><div class='big'>${subtitle || ''}</div>`;
    setTimeout(()=>{ elStatus.style.display='none'; }, 2500);
  }

  function extractToken(text){
    try{
      const u = new URL(text);
      const parts = u.pathname.split('/').filter(Boolean);
      if (parts.length >= 2 && parts[0] === 'q') return parts[1];
      return parts[parts.length-1];
    }catch(e){
      return text.trim();
    }
  }

  async function validateScanned(raw){
    if (busy) return;
    if (!pickupPoint.value){
      showResult(false, 'RECHAZADO', 'Selecciona punto de subida');
      return;
    }
    busy = true;

    const token = extractToken(raw);
    const params = new URLSearchParams({
      token,
      trip_type: tripType.value,
      pickup_point: pickupPoint.value
    });

    try{
      const res = await fetch(`/api/validate?${params.toString()}`);
      const data = await res.json();

if (data.result === 'OK'){
  const planTxt = data.plan ? ` - ${data.plan}` : '';
  const remTxt = (data.rides_remaining !== undefined && data.rides_remaining !== null) ? ` | Restan: ${data.rides_remaining}` : '';
  const msgTxt = data.message ? ` | ${data.message}` : '';
  showResult(true, 'OK', `${data.full_name} (${data.code})${planTxt}${remTxt}${msgTxt}`);
} else {
  const reason = data.reason ? ` - ${data.reason}` : '';
  const remTxt = (data.rides_remaining !== undefined && data.rides_remaining !== null) ? ` | Restan: ${data.rides_remaining}` : '';
  const msgTxt = data.message ? ` | ${data.message}` : '';
  showResult(false, `RECHAZADO${reason}`, `${data.full_name || ''} ${data.code ? '('+data.code+')' : ''}${remTxt}${msgTxt}`);
}
    } catch (e){
      showResult(false, 'ERROR', 'No se pudo validar');
    } finally {
      busy = false;
    }
  }

async function startCamera(){
  if (!pickupPoint.value){
    showResult(false, 'RECHAZADO', 'Selecciona punto de subida');
    return;
  }
  if (running) return;

  startBtn.disabled = true;
  stopBtn.disabled = false;

  try{
    // Si ya había un stream previo, ciérralo (evita cámara "ocupada")
    if (stream){
      try { stream.getTracks().forEach(t => t.stop()); } catch {}
      stream = null;
    }

    // 1) Intento: environment ideal
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
    } catch (e1) {
      // 2) Fallback: sin facingMode (iOS a veces falla con constraints)
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
      } catch (e2) {
        // 3) Último fallback: lo que sea
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      }
    }

    // Si por alguna razón sigue null, aborta limpio
    if (!stream){
      showResult(false, 'ERROR', 'No se obtuvo stream de cámara');
      stopCamera();
      return;
    }

    // iOS: asegurar inline + autoplay
    video.srcObject = stream;
    video.setAttribute("playsinline", "true");
    video.muted = true;

    // iOS: a veces play() falla si no hay stream listo
    await video.play();
    running = true;

    if ("BarcodeDetector" in window) {
      const detector = new BarcodeDetector({ formats: ["qr_code"] });
      scanLoopBarcodeDetector(detector);
    } else {
      const ZX = window.ZXingBrowser || window.ZXing;
      if (!ZX) throw new Error("ZXing no cargó");
      zxingReader = new ZX.BrowserQRCodeReader();
      scanLoopZXing();
    }
  } catch (e){
    console.error(e);

    const secure = window.isSecureContext ? "YES" : "NO";
    const hasMedia = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
    const msg = `${e?.name || "Error"}: ${e?.message || "sin detalle"} | secure=${secure} | media=${hasMedia}`;

    showResult(false, 'ERROR', msg);
    stopCamera();
  }
}

    video.srcObject = stream;
    video.setAttribute("playsinline", "true");
    video.muted = true;

    await video.play();
    running = true;

    if ("BarcodeDetector" in window) {
      const detector = new BarcodeDetector({ formats: ["qr_code"] });
      scanLoopBarcodeDetector(detector);
    } else {
      const ZX = window.ZXingBrowser || window.ZXing;
      if (!ZX) throw new Error("ZXing no cargó");
      zxingReader = new ZX.BrowserQRCodeReader();
      scanLoopZXing();
    }
  } catch (e){
    console.error(e);
    showResult(false, 'ERROR', 'No se pudo iniciar cámara (iPhone)');
    stopCamera();
  }
}

  function stopCamera(){
    running = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;

    if (zxingReader){
      try { zxingReader.reset(); } catch {}
      zxingReader = null;
    }

    if (stream){
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    video.srcObject = null;
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  async function scanLoopBarcodeDetector(detector){
    while(running){
      try{
        if (video.readyState < 2) { await sleep(80); continue; }
        const codes = await detector.detect(video);
        if (codes && codes.length){
          const raw = (codes[0].rawValue || "").trim();
          if (raw){
            const tokenMaybe = extractToken(raw);
            if (tokenMaybe && tokenMaybe !== lastToken){
              lastToken = tokenMaybe;
              await validateScanned(raw);
            }
          }
        }
      } catch (e){
        console.error(e);
      }
      await sleep(120);
    }
  }

  async function scanLoopZXing(){
    try{
      await zxingReader.decodeFromVideoElementContinuously(video, async (result) => {
        if (!running) return;
        if (result){
          const raw = (result.getText ? result.getText() : String(result)).trim();
          if (!raw) return;
          const tokenMaybe = extractToken(raw);
          if (tokenMaybe && tokenMaybe !== lastToken){
            lastToken = tokenMaybe;
            await validateScanned(raw);
          }
        }
      });
    } catch (e){
      console.error(e);
    }
  }

  startBtn.addEventListener('click', startCamera);
  stopBtn.addEventListener('click', stopCamera);
  window.addEventListener('beforeunload', stopCamera);
(function(){
  const ua = (navigator.userAgent || "").toLowerCase();
  const isInApp =
    ua.includes("instagram") ||
    ua.includes("fbav") || ua.includes("fban") ||
    ua.includes("whatsapp") ||
    ua.includes("gsa") ||          // Google Search App
    ua.includes("gmail") ||
    ua.includes("linkedin");

  if (isInApp) {
    showResult(false, "ATENCIÓN", "iPhone: abre en Safari (in-app browser bloquea cámara)");
  }
})();
</script>
</body>
</html>
